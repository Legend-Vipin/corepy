name: Corepy CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.os }} / Py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-suffix: "py${{ matrix.python-version }}"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      # Note: 'uv sync' handles dependencies AND local workspace packages (rust/corepy-runtime)
      # assuming pyproject.toml is correctly configured with tool.uv.sources.
      - name: Install Dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenblas-dev cmake ninja-build

      - name: Build C++ kernels (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          cmake -S csrc -B csrc/build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build csrc/build --config Release

      - name: Install Dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install openblas cmake ninja
          echo "CMAKE_PREFIX_PATH=$(brew --prefix openblas)" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=$(brew --prefix openblas)/lib/pkgconfig" >> $GITHUB_ENV
          echo "LIBRARY_PATH=$(brew --prefix openblas)/lib:$LIBRARY_PATH" >> $GITHUB_ENV

      - name: Build C++ kernels (macOS)
        if: runner.os == 'macOS'
        run: |
          cmake -S csrc -B csrc/build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build csrc/build --config Release

      - name: Ensure safe RUSTFLAGS on macOS
        if: runner.os == 'macOS'
        run: |
          # Avoid GNU-specific linker flags on macOS
          echo "RUSTFLAGS=-C target-cpu=native" >> $GITHUB_ENV

      - name: Install Dependencies (Windows)
        if: runner.os == 'Windows'
        uses: conda-incubator/setup-miniconda@v2
        with:
          auto-update-conda: false
          activate-environment: corepy-ci
          python-version: ${{ matrix.python-version }}

      - name: Install OpenBLAS (Windows)
        if: runner.os == 'Windows'
        run: |
          conda install -y -c conda-forge openblas

      - name: Ensure safe RUSTFLAGS on Windows
        if: runner.os == 'Windows'
        run: |
          echo "RUSTFLAGS=-C target-cpu=native" >> $GITHUB_ENV

      - name: Install Dependencies & Project
        shell: bash
        run: |
          uv sync --all-extras --group dev

      - name: Build Rust Extension
        shell: bash
        run: |
          cd rust/corepy-runtime
          uv run maturin develop --release

      # Optional: Explicit check that imports work
      - name: Verify Import
        shell: bash
        run: |
          uv run python -c "import corepy; print(f'Successfully imported corepy {corepy.__version__}')"
          # corepy-runtime is an implementation detail, but checking it implies the rust extension loaded
          
      - name: Run Tests
        shell: bash
        run: |
          uv run pytest tests/ --cov=corepy --cov-report=term
